name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/566290227532/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deploy@summer-meridian-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: gcloud run deploy canvas --source . --region=us-central1 --allow-unauthenticated
